{{/* BreadcrumbList structured data for all non-home pages. */}}
{{ if not .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": {{ site.BaseURL | jsonify }}
    }
    {{- if and .IsPage .CurrentSection (not .CurrentSection.IsHome) -}}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": {{ .CurrentSection.Title | jsonify }},
      "item": {{ .CurrentSection.Permalink | jsonify }}
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": {{ .Title | jsonify }},
      "item": {{ .Permalink | jsonify }}
    }
    {{- else -}}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": {{ .Title | jsonify }},
      "item": {{ .Permalink | jsonify }}
    }
    {{- end }}
  ]
}
</script>
{{ end }}
